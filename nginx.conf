events {}

http {
  # Basit API gateway + rate limiting
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

  server {
    listen 80;

    # Docker gömülü DNS. Servis restart olunca IP değişir; değişken + resolver
    # ile nginx her istekte yeniden çözer, ölü IP'ye takılıp 502 vermez.
    resolver 127.0.0.11 valid=5s ipv6=off;

    location /a/ {
      limit_req zone=api_limit burst=30 nodelay;
      set $svc_a servis_a:5000;
      rewrite ^/a/(.*)$ /$1 break;
      proxy_pass http://$svc_a;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /b/ {
      limit_req zone=api_limit burst=30 nodelay;
      set $svc_b servis_b:5000;
      rewrite ^/b/(.*)$ /$1 break;
      proxy_pass http://$svc_b;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /c/ {
      limit_req zone=api_limit burst=30 nodelay;
      set $svc_c servis_c:5000;
      rewrite ^/c/(.*)$ /$1 break;
      proxy_pass http://$svc_c;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- TRAFİK YÖNLENDİRME (FAILOVER) ---
    # /islem once PRIMARY'ye (Servis C) gider. Servis C cokerse veya hata verirse
    # nginx istegi otomatik YEDEK'e (Servis A) yonlendirir; kullanici kesinti gormez.
    # resolver + degisken sayesinde primary geri gelince trafik otomatik ona doner.
    location = /islem {
      limit_req zone=api_limit burst=30 nodelay;
      set $islem_primary servis_c:5000;
      proxy_pass http://$islem_primary/islem;
      proxy_intercept_errors on;
      proxy_connect_timeout 2s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      error_page 502 503 504 = @islem_yedek;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location @islem_yedek {
      set $islem_backup servis_a:5000;
      proxy_pass http://$islem_backup/islem;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
      return 200 "gateway_ok";
      add_header Content-Type text/plain;
    }

    location = / {
      default_type text/html;
      return 200 '<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"><title>API Gateway</title><style>body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;max-width:640px;margin:40px auto;padding:0 20px}h1{font-size:20px}a{color:#38bdf8;text-decoration:none}li{margin:8px 0;list-style:none}code{background:#1e293b;padding:2px 8px;border-radius:6px}</style></head><body><h1>Nginx API Gateway</h1><p>Mikroservislerin tek giris kapisi. Asagidaki yollar aktif:</p><ul><li><code>GET</code> <a href="/health">/health</a> &mdash; gateway durumu</li><li><code>GET</code> <a href="/a/health">/a/...</a> &mdash; Servis A (PostgreSQL + Redis)</li><li><code>GET</code> <a href="/b/cache/stats">/b/...</a> &mdash; Servis B (Redis cache)</li><li><code>GET</code> <a href="/c/health">/c/...</a> &mdash; Servis C</li></ul></body></html>';
    }
  }
}
