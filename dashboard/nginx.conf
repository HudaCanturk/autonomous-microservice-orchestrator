server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Docker'ın gömülü DNS'i. Konteyner restart olunca IP değişir;
    # değişken + resolver ile nginx her istekte yeniden DNS çözer (502 önlenir).
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Servis A proxy
    location /proxy/servis-a/ {
        set $svc_a servis_a:5000;
        rewrite ^/proxy/servis-a/(.*)$ /$1 break;
        proxy_pass http://$svc_a;
        add_header Access-Control-Allow-Origin *;
    }

    # Servis B proxy
    location /proxy/servis-b/ {
        set $svc_b servis_b:5000;
        rewrite ^/proxy/servis-b/(.*)$ /$1 break;
        proxy_pass http://$svc_b;
        add_header Access-Control-Allow-Origin *;
    }

    # Servis C proxy
    location /proxy/servis-c/ {
        set $svc_c servis_c:5000;
        rewrite ^/proxy/servis-c/(.*)$ /$1 break;
        proxy_pass http://$svc_c;
        add_header Access-Control-Allow-Origin *;
    }

    # Prometheus proxy
    location /proxy/prometheus/ {
        set $prom prometheus:9090;
        rewrite ^/proxy/prometheus/(.*)$ /$1 break;
        proxy_pass http://$prom;
        add_header Access-Control-Allow-Origin *;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
