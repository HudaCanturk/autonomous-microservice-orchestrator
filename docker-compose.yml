services:
  servis_a:
    build: .
    ports:
      - "5001:5000"
    environment:
      - SERVICE_NAME=Servis_A
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=servis_a
      - POSTGRES_USER=servis_a
      - POSTGRES_PASSWORD=servis_a_pass
    depends_on:
      - redis
      - postgres

  servis_b:
    build: .
    ports:
      - "5002:5000"
    environment:
      - SERVICE_NAME=Servis_B
      - REDIS_HOST=redis
    depends_on:
      - redis

  servis_c:
    build: .
    ports:
      - "5003:5000"
    environment:
      - SERVICE_NAME=Servis_C

  servis_d_gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - servis_a
      - servis_b
      - servis_c

  # Servis A'nın gerçek veritabanı — ayrı container, bağımsız çökertilebilir
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=servis_a
      - POSTGRES_USER=servis_a
      - POSTGRES_PASSWORD=servis_a_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # n8n Otomasyon Aracı — otonom karar motoru (Gemini)
  n8n:
    user: root
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_BLOCK_NODES= 
      - NODE_FUNCTION_ALLOW_BUILTIN=child_process,http,https,fs
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - TZ=Europe/Istanbul
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=1
      - EXECUTIONS_TIMEOUT=300
      - EXECUTIONS_TIMEOUT_MAX=600
    volumes:
      - ./n8n_data:/root/.n8n
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker

  # Frontend Dashboard — tüm servislerin anlık durumunu gösterir
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - servis_a
      - servis_b
      - servis_c
      - prometheus

volumes:
  n8n_data:
  postgres_data:
  redis_data:
